name: Release GABS Binaries

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag or release to package, for example v0.1.0
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.release.tag_name || inputs.release_tag || github.ref_name }}

      - name: Set up Go
        uses: actions/setup-go@v6.0.0
        with:
          go-version: "1.22"

      - name: Run tests
        run: go test ./...

  build-and-upload:
    needs: verify
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            extension: .exe
          - goos: linux
            goarch: amd64
            extension: ""
          - goos: linux
            goarch: arm64
            extension: ""
          - goos: darwin
            goarch: amd64
            extension: ""
          - goos: darwin
            goarch: arm64
            extension: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.release.tag_name || inputs.release_tag }}

      - name: Set up Go
        uses: actions/setup-go@v6.0.0
        with:
          go-version: "1.22"

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          BINARY_EXTENSION: ${{ matrix.extension }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          set -euo pipefail

          VERSION="$RELEASE_TAG"
          COMMIT="$(git rev-parse HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          STAGE_DIR="dist/gabs-${VERSION}-${GOOS}-${GOARCH}"
          BINARY_NAME="gabs${BINARY_EXTENSION}"
          ARCHIVE_NAME="gabs-${VERSION}-${GOOS}-${GOARCH}.zip"

          rm -rf "$STAGE_DIR"
          mkdir -p "$STAGE_DIR"

          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build \
            -trimpath \
            -ldflags "\
              -X github.com/pardeike/gabs/internal/version.Version=${VERSION} \
              -X github.com/pardeike/gabs/internal/version.Commit=${COMMIT} \
              -X github.com/pardeike/gabs/internal/version.BuildDate=${BUILD_DATE}" \
            -o "$STAGE_DIR/$BINARY_NAME" \
            ./cmd/gabs

          cp README.md LICENSE example-config.json "$STAGE_DIR/"
          cp -R docs "$STAGE_DIR/"

          (
            cd dist
            zip -qr "$ARCHIVE_NAME" "$(basename "$STAGE_DIR")"
          )

      - name: Upload archive to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          gh release upload \
            "$RELEASE_TAG" \
            "dist/gabs-${RELEASE_TAG}-${GOOS}-${GOARCH}.zip" \
            --clobber
